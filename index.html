<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trainmore">
<meta name="theme-color" content="#0A0C10">
<title>Trainmore — Muscle Program</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{background:#0A0C10;color:#E8EDF5;font-family:'Barlow',sans-serif;min-height:100vh;min-height:-webkit-fill-available}
input[type=number]{background:#0D1117;border:1px solid #1E2530;color:#E8EDF5;border-radius:6px;padding:5px 7px;font-size:13px;width:100%;font-family:'Barlow',sans-serif;outline:none;-webkit-appearance:none;-moz-appearance:textfield}
input[type=number]:focus{border-color:#00BFFF}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:#1E2530}
.day-btn{transition:all 0.15s}
.check-btn{cursor:pointer;border-radius:50%;width:26px;height:26px;border:2px solid #1E2530;background:transparent;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.check-btn.done{background:#22C55E;border-color:#22C55E}
.add-set-btn{background:transparent;border:1px dashed #1E2530;color:#6B7A94;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:'Barlow',sans-serif;transition:all 0.15s}
.add-set-btn:hover{border-color:#00BFFF;color:#00BFFF}
.finish-btn{background:#00BFFF;color:#000;border:none;border-radius:8px;padding:12px 0;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;cursor:pointer;flex:1;transition:opacity 0.15s}
.finish-btn:active{opacity:0.85}
.discard-btn{background:transparent;color:#EF4444;border:1px solid #EF4444;border-radius:8px;padding:12px 16px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer}
.muscle-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-family:'Barlow',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;
const ACCENT="#00BFFF",ACCENT2="#0080FF",BG="#0A0C10",CARD="#111418",BORDER="#1E2530",TEXT="#E8EDF5",MUTED="#6B7A94",GREEN="#22C55E",AMBER="#F59E0B";
const FONT="'Barlow Condensed',Impact,sans-serif";
const STORAGE_KEY="trainmore_v1";

function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function saveState(s){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch(e){}}

const QUOTES=[
  {text:"The only bad workout is the one that didn't happen.",attr:"Unknown"},
  {text:"Strength doesn't come from what you can do. It comes from overcoming the things you once thought you couldn't.",attr:"Rikki Rogers"},
  {text:"Every rep is a down payment on the body you want.",attr:"Unknown"},
  {text:"You don't have to be great to start, but you have to start to be great.",attr:"Zig Ziglar"},
  {text:"Pain is temporary. Pride is forever.",attr:"Unknown"},
  {text:"The iron never lies to you.",attr:"Henry Rollins"},
  {text:"Your body can stand almost anything. It's your mind you have to convince.",attr:"Unknown"},
  {text:"Fall in love with the process and the results will come.",attr:"Eric Thomas"},
  {text:"If it doesn't challenge you, it doesn't change you.",attr:"Fred DeVito"},
  {text:"Work hard in silence. Let your muscles do the talking.",attr:"Unknown"},
  {text:"Champions aren't made in gyms. Champions are made from something deep inside.",attr:"Muhammad Ali"},
  {text:"Success is usually the culmination of controlling failure.",attr:"Sylvester Stallone"},
  {text:"The difference between try and triumph is a little umph.",attr:"Marvin Phillips"},
  {text:"Obsessed is a word the lazy use to describe the dedicated.",attr:"Unknown"},
  {text:"If you're tired of starting over, stop giving up.",attr:"Unknown"},
  {text:"The clock is ticking. Are you becoming the person you want to be?",attr:"Greg Plitt"},
  {text:"No matter how slow you go, you're still lapping everyone on the couch.",attr:"Unknown"},
  {text:"Train insane or remain the same.",attr:"Unknown"},
  {text:"You're only one workout away from a good mood.",attr:"Unknown"},
  {text:"Strive for progress, not perfection.",attr:"Unknown"},
  {text:"Push yourself because no one else is going to do it for you.",attr:"Unknown"},
  {text:"Do something today that your future self will thank you for.",attr:"Sean Patrick Flanery"},
  {text:"Discipline is choosing between what you want now and what you want most.",attr:"Abraham Lincoln"},
  {text:"Don't wish for it. Work for it.",attr:"Unknown"},
  {text:"The body achieves what the mind believes.",attr:"Unknown"},
  {text:"Sweat is just fat crying.",attr:"Unknown"},
];

const PLAN={
  "Day 1: Push":{color:"#FF6B35",exercises:[{name:"Incline Dumbbell Press",muscle:"Upper Chest",prev:"18kg × 10"},{name:"Flat Bench Press",muscle:"Chest",prev:"22.5kg × 8"},{name:"Arnold Press",muscle:"Shoulders",prev:"14kg × 10"},{name:"Cable Lateral Raise",muscle:"Side Delts",prev:"5kg × 12"},{name:"Tricep Pushdown",muscle:"Triceps",prev:"15kg × 12"},{name:"Overhead Tricep Ext",muscle:"Triceps",prev:"20kg × 10"}]},
  "Day 2: Pull":{color:"#8B5CF6",exercises:[{name:"Neutral Grip Pulldown",muscle:"Lats",prev:"35kg × 10"},{name:"Seated Cable Row",muscle:"Mid Back",prev:"35kg × 10"},{name:"Bent-Over Row",muscle:"Back",prev:"14kg × 10"},{name:"Incline DB Curl",muscle:"Biceps",prev:"10kg × 12"},{name:"Hammer Curl",muscle:"Biceps",prev:"10kg × 12"},{name:"Face Pull",muscle:"Rear Delts",prev:"15kg × 15"}]},
  "Day 3: Legs":{color:"#10B981",exercises:[{name:"Leg Press",muscle:"Quads",prev:"60kg × 12"},{name:"Leg Extension",muscle:"Quads",prev:"30kg × 12"},{name:"Hamstring Curl",muscle:"Hamstrings",prev:"30kg × 10"},{name:"Dumbbell Lunge",muscle:"Glutes",prev:"12kg × 10"},{name:"Calf Raises",muscle:"Calves",prev:"45kg × 15"},{name:"Dumbbell Squat",muscle:"Quads",prev:"20kg × 12"}]},
  "Day 4: Upper":{color:"#F59E0B",exercises:[{name:"Weighted Dips",muscle:"Chest/Triceps",prev:"+30kg × 8"},{name:"Shoulder Press",muscle:"Shoulders",prev:"35kg × 10"},{name:"Front Raise",muscle:"Front Delts",prev:"6kg × 12"},{name:"Bicep Curl",muscle:"Biceps",prev:"5kg × 15"},{name:"Tricep Kickback",muscle:"Triceps",prev:"16kg × 12"},{name:"Bent-Over Row",muscle:"Back",prev:"14kg × 10"}]},
};
const MCOLORS={"Upper Chest":"#FF8C5A","Chest":"#FF6B35","Chest/Triceps":"#F87171","Quads":"#10B981","Hamstrings":"#059669","Calves":"#34D399","Back":"#8B5CF6","Lats":"#A78BFA","Mid Back":"#C4B5FD","Rear Delts":"#DDD6FE","Shoulders":"#00BFFF","Side Delts":"#38BDF8","Front Delts":"#7DD3FC","Biceps":"#F59E0B","Triceps":"#EF4444","Glutes":"#10B981"};

const SEED_HISTORY=[
  {id:1,name:"Day 1: Push",date:"2025-04-21",duration:50,sets:18,exercises:["Incline DB Press","Flat Bench Press","Arnold Press","Tricep Pushdown"],prs:["Incline DB Press"]},
  {id:2,name:"Day 3: Legs",date:"2025-04-18",duration:55,sets:20,exercises:["Leg Press","Leg Extension","Hamstring Curl","Calf Raises"],prs:["Leg Press","Calf Raises"]},
  {id:3,name:"Day 2: Pull",date:"2025-04-16",duration:48,sets:16,exercises:["Neutral Grip Pulldown","Seated Cable Row","Incline DB Curl","Hammer Curl"],prs:[]},
  {id:4,name:"Day 1: Push",date:"2025-04-14",duration:52,sets:18,exercises:["Incline DB Press","Flat Bench Press","Arnold Press","Tricep Pushdown"],prs:["Flat Bench Press"]},
];
const SEED_PRS=[{exercise:"Weighted Dips",weight:"+30kg",reps:8,date:"Apr 14"},{exercise:"Seated Cable Row",weight:"35kg",reps:10,date:"Apr 16"},{exercise:"Leg Press",weight:"60kg",reps:12,date:"Apr 18"}];
const SEED_WEIGHT=69;
const WEEKLY_VOL=[{muscle:"Legs",volume:11200,color:"#10B981"},{muscle:"Chest",volume:8400,color:"#FF6B35"},{muscle:"Back",volume:7200,color:"#8B5CF6"},{muscle:"Shoulders",volume:4800,color:"#00BFFF"},{muscle:"Triceps",volume:4200,color:"#EF4444"},{muscle:"Biceps",volume:3600,color:"#F59E0B"}];
const SPARK={"Bench Press":[20,20,21,22.5,22.5,23,24],"Leg Press":[50,55,55,60,60,62.5,65],"Cable Row":[30,32.5,35,35,37.5,37.5,40],"Incline DB":[16,16,17,18,18,19,20]};

function getWeekNum(){const start=new Date("2025-04-26");return Math.max(0,Math.floor((new Date()-start)/(7*24*60*60*1000)));}
function fmtTime(s){return`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`}
function fmtDate(iso){return new Date(iso).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
function todayISO(){return new Date().toISOString().split("T")[0];}

function calcStreak(history){
  if(!history.length)return 0;
  const sorted=[...history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const unique=[...new Set(sorted.map(s=>s.date))];
  const today=todayISO();
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yISO=yest.toISOString().split("T")[0];
  if(unique[0]!==today&&unique[0]!==yISO)return 0;
  let streak=0,check=new Date(unique[0]);
  for(const d of unique){
    if(d===check.toISOString().split("T")[0]){streak++;check.setDate(check.getDate()-1);}else break;
  }
  return streak;
}

function ConfirmStrip({day,onConfirm,onCancel}){
  const info=PLAN[day];
  return h("div",{style:{background:`${info.color}14`,border:`1px solid ${info.color}44`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
    h("div",{style:{fontSize:12,color:TEXT}},"Start ",h("span",{style:{color:info.color,fontFamily:FONT,fontWeight:800,letterSpacing:1}},day.toUpperCase()),"?"),
    h("div",{style:{display:"flex",gap:8}},
      h("button",{onClick:onCancel,style:{background:"transparent",border:`1px solid ${BORDER}`,color:MUTED,borderRadius:6,padding:"5px 14px",cursor:"pointer",fontFamily:FONT,fontSize:12,letterSpacing:1}},"CANCEL"),
      h("button",{onClick:onConfirm,style:{background:info.color,border:"none",color:"#000",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontFamily:FONT,fontWeight:800,fontSize:12,letterSpacing:1}},"LET'S GO")
    )
  );
}

function DayButton({day,pendingDay,onRequest,onConfirm,onCancel,sub}){
  const info=PLAN[day];const isPending=pendingDay===day;
  return h("div",null,
    h("button",{className:"day-btn",onClick:()=>onRequest(day),style:{background:isPending?`${info.color}18`:CARD,border:`1px solid ${isPending?info.color+"55":BORDER}`,borderLeft:`3px solid ${info.color}`,borderRadius:isPending?"10px 10px 0 0":10,padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",textAlign:"left",width:"100%"}},
      h("div",null,
        h("div",{style:{fontFamily:FONT,fontSize:16,fontWeight:800,letterSpacing:1,color:TEXT}},day.toUpperCase()),
        h("div",{style:{fontSize:11,color:MUTED,marginTop:3}},sub)
      ),
      h("div",{style:{fontFamily:FONT,fontSize:22,color:info.color,fontWeight:800}},"▶")
    ),
    isPending&&h(ConfirmStrip,{day,onConfirm,onCancel})
  );
}

function getNextDay(history){
  const order=Object.keys(PLAN);
  if(!history.length)return order[0];
  const idx=order.indexOf(history[0].name);
  return order[(idx+1)%order.length];
}
function getDaysSince(history){
  if(!history.length)return null;
  return Math.floor((new Date()-new Date(history[0].date))/(24*60*60*1000));
}

function App(){
  const saved=loadState();
  const [history,setHistoryRaw]=useState(saved?.history||SEED_HISTORY);
  const [prs,setPrsRaw]=useState(saved?.prs||SEED_PRS);
  const [bodyWeight,setBodyWeightRaw]=useState(saved?.bodyWeight||SEED_WEIGHT);
  const [tab,setTab]=useState("dashboard");
  const [activeW,setActiveW]=useState(null);
  const [wSets,setWSets]=useState({});
  const [elapsed,setElapsed]=useState(0);
  const [running,setRunning]=useState(false);
  const [pendingDay,setPendingDay]=useState(null);
  const timerRef=useRef(null);

  useEffect(()=>{saveState({history,prs,bodyWeight});},[history,prs,bodyWeight]);
  useEffect(()=>{
    if(running){timerRef.current=setInterval(()=>setElapsed(e=>e+1),1000);}
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[running]);

  const setHistory=v=>setHistoryRaw(typeof v==="function"?v:()=>v);
  const setBodyWeight=v=>{setBodyWeightRaw(v);};

  const requestW=day=>setPendingDay(day);
  const cancelW=()=>setPendingDay(null);
  const confirmW=()=>{
    const day=pendingDay;setPendingDay(null);
    const sets={};PLAN[day].exercises.forEach(ex=>{sets[ex.name]=[{weight:"",reps:"",done:false}];});
    setWSets(sets);setActiveW(day);setElapsed(0);setRunning(true);setTab("workout");
  };
  function toggleSet(ex,idx){setWSets(p=>{const u=[...p[ex]];u[idx]={...u[idx],done:!u[idx].done};return{...p,[ex]:u};});}
  function updateSet(ex,idx,f,v){setWSets(p=>{const u=[...p[ex]];u[idx]={...u[idx],[f]:v};return{...p,[ex]:u};});}
  function addSet(ex){setWSets(p=>({...p,[ex]:[...p[ex],{weight:"",reps:"",done:false}]}));}
  function finishW(){
    const totalSets=Object.values(wSets).reduce((a,s)=>a+s.filter(x=>x.done).length,0);
    setHistory(p=>[{id:Date.now(),name:activeW,date:todayISO(),duration:Math.max(1,Math.floor(elapsed/60)),sets:totalSets,exercises:Object.keys(wSets),prs:[]},...p]);
    setActiveW(null);setRunning(false);setElapsed(0);setTab("history");
  }
  function discardW(){setActiveW(null);setRunning(false);setElapsed(0);setTab("dashboard");}

  const streak=calcStreak(history);
  const thisWeek=history.filter(s=>{
    const d=new Date(s.date),now=new Date(),mon=new Date(now);
    mon.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));mon.setHours(0,0,0,0);
    return d>=mon;
  }).length;

  const NAV=[{id:"dashboard",label:"HOME",icon:"⌂"},{id:"workout",label:"WORKOUT",icon:"▷"},{id:"history",label:"HISTORY",icon:"≡"},{id:"progress",label:"PROGRESS",icon:"◈"}];

  return h("div",{style:{background:BG,minHeight:"100vh",paddingBottom:80}},
    h("div",{style:{background:CARD,borderBottom:`1px solid ${BORDER}`,padding:"12px 14px 10px",position:"sticky",top:0,zIndex:50}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
        h("div",null,
          h("div",{style:{fontFamily:FONT,fontSize:20,fontWeight:800,letterSpacing:3,color:ACCENT}},"TRAINMORE"),
          h("div",{style:{fontSize:10,color:MUTED,letterSpacing:1.5,marginTop:1}},"MUSCLE PROGRAM · 6 MONTHS")
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:11,color:MUTED}},bodyWeight+"kg → ",h("span",{style:{color:ACCENT,fontWeight:600}},"75kg")),
          h("div",{style:{fontSize:10,color:MUTED,marginTop:1}},"Apr 26 – Oct 26, 2025")
        )
      ),
      running&&h("div",{style:{marginTop:10,background:"#0D1A2D",border:`1px solid ${ACCENT}33`,borderRadius:8,padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:8}},
          h("div",{style:{width:7,height:7,borderRadius:"50%",background:ACCENT}}),
          h("span",{style:{fontFamily:FONT,fontSize:13,letterSpacing:1.5,color:ACCENT}},activeW?.toUpperCase())
        ),
        h("div",{style:{fontFamily:FONT,fontSize:22,fontWeight:800,color:TEXT,letterSpacing:3}},fmtTime(elapsed))
      )
    ),
    h("div",{style:{maxWidth:640,margin:"0 auto",padding:"0 12px"}},
      tab==="dashboard"&&h(Dashboard,{history,prs,streak,thisWeek,pendingDay,onRequest:requestW,onConfirm:confirmW,onCancel:cancelW,bodyWeight,setBodyWeight}),
      tab==="workout"&&h(WorkoutScreen,{activeW,wSets,onToggle:toggleSet,onUpdate:updateSet,onAdd:addSet,onFinish:finishW,onDiscard:discardW,pendingDay,onRequest:requestW,onConfirm:confirmW,onCancel:cancelW,elapsed,running}),
      tab==="history"&&h(HistoryScreen,{history,setHistory}),
      tab==="progress"&&h(ProgressScreen,{history,bodyWeight})
    ),
    h("div",{style:{position:"fixed",bottom:0,left:0,right:0,background:CARD,borderTop:`1px solid ${BORDER}`,display:"flex",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}},
      NAV.map(({id,label,icon})=>h("button",{key:id,onClick:()=>{setPendingDay(null);setTab(id);},style:{flex:1,background:"transparent",border:"none",padding:"10px 4px 8px",cursor:"pointer"}},
        h("div",{style:{fontFamily:FONT,fontSize:17,fontWeight:tab===id?800:600,color:tab===id?ACCENT:MUTED,lineHeight:1}},icon),
        h("div",{style:{fontFamily:FONT,fontSize:9,letterSpacing:1.5,marginTop:3,color:tab===id?ACCENT:MUTED}},label)
      ))
    )
  );
}

function SB({label,value,sub,accent}){
  return h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 10px",flex:1}},
    h("div",{style:{fontFamily:FONT,fontSize:28,fontWeight:800,color:accent||TEXT,lineHeight:1}},value),
    h("div",{style:{fontFamily:FONT,fontSize:10,color:MUTED,letterSpacing:1.5,marginTop:4}},label),
    sub&&h("div",{style:{fontSize:10,color:MUTED,marginTop:1}},sub)
  );
}

function WeeklyQuote(){
  const q=QUOTES[getWeekNum()%QUOTES.length];
  return h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderLeft:`3px solid ${ACCENT}`,borderRadius:10,padding:"14px 16px",marginBottom:12,position:"relative",overflow:"hidden"}},
    h("div",{style:{position:"absolute",top:0,right:0,width:80,height:"100%",background:`linear-gradient(90deg,transparent,${ACCENT}08)`,pointerEvents:"none"}}),
    h("div",{style:{fontFamily:FONT,fontSize:9,letterSpacing:2.5,color:ACCENT,marginBottom:8}},"WEEK "+(getWeekNum()+1)+" · APR 26 – OCT 26"),
    h("div",{style:{fontFamily:FONT,fontSize:17,fontWeight:700,color:TEXT,lineHeight:1.35}},"\u201C",q.text,"\u201D"),
    h("div",{style:{fontSize:11,color:MUTED,marginTop:8}},"\u2014 ",q.attr)
  );
}

function NextWorkoutCard({history,pendingDay,onRequest,onConfirm,onCancel}){
  const next=getNextDay(history);const info=PLAN[next];
  const daysSince=getDaysSince(history);const isPending=pendingDay===next;
  let restMsg=null;
  if(daysSince===0)restMsg=h("span",{style:{color:GREEN,fontSize:11}},"✓ You trained today");
  else if(daysSince===1)restMsg=h("span",{style:{color:AMBER,fontSize:11}},"Last session: yesterday");
  else if(daysSince>1)restMsg=h("span",{style:{color:"#EF4444",fontSize:11}},daysSince+" days since last session");
  else restMsg=h("span",{style:{color:MUTED,fontSize:11}},"No sessions logged yet");
  return h("div",null,
    h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderLeft:`3px solid ${info.color}`,borderRadius:isPending?"10px 10px 0 0":10,padding:"14px 16px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
        h("div",null,
          h("div",{style:{fontFamily:FONT,fontSize:10,letterSpacing:2.5,color:MUTED,marginBottom:4}},"UP NEXT"),
          h("div",{style:{fontFamily:FONT,fontSize:22,fontWeight:800,color:TEXT,letterSpacing:1}},next.toUpperCase()),
          restMsg
        ),
        h("button",{className:"day-btn",onClick:()=>onRequest(next),style:{background:info.color,border:"none",borderRadius:8,padding:"10px 18px",cursor:"pointer",fontFamily:FONT,fontWeight:800,fontSize:14,letterSpacing:1.5,color:"#000",flexShrink:0}},"START ▶")
      ),
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
        info.exercises.slice(0,5).map(ex=>h("span",{key:ex.name,className:"muscle-pill",style:{background:`${MCOLORS[ex.muscle]||ACCENT}18`,color:MCOLORS[ex.muscle]||ACCENT,border:`1px solid ${MCOLORS[ex.muscle]||ACCENT}33`}},ex.name))
      )
    ),
    isPending&&h(ConfirmStrip,{day:next,onConfirm,onCancel})
  );
}

function ThisWeekCard({history}){
  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const today=new Date(),dow=today.getDay();
  const monday=new Date(today);monday.setDate(today.getDate()-(dow===0?6:dow-1));monday.setHours(0,0,0,0);
  const sessionDows=new Set();
  history.forEach(s=>{const d=new Date(s.date);if(d>=monday&&d<=today){const sd=d.getDay();sessionDows.add(sd===0?6:sd-1);}});
  const todayDow=dow===0?6:dow-1;
  return h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"14px 16px",marginBottom:10}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      h("div",{style:{fontFamily:FONT,fontSize:10,letterSpacing:2.5,color:MUTED}},"THIS WEEK"),
      h("span",{style:{fontFamily:FONT,fontSize:13,color:sessionDows.size>=4?GREEN:ACCENT}},sessionDows.size+"/4",h("span",{style:{color:MUTED,fontWeight:400}}," sessions"))
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}},
      days.map((d,i)=>{
        const done=sessionDows.has(i),isToday=i===todayDow,isFuture=i>todayDow;
        return h("div",{key:d,style:{textAlign:"center"}},
          h("div",{style:{fontFamily:FONT,fontSize:9,color:isToday?ACCENT:MUTED,letterSpacing:0.5,marginBottom:4}},d.toUpperCase()),
          h("div",{style:{height:32,borderRadius:6,background:done?`${ACCENT}22`:"#0D1117",border:`1px solid ${done?ACCENT+"55":isToday?ACCENT+"44":BORDER}`,display:"flex",alignItems:"center",justifyContent:"center"}},
            done?h("span",{style:{fontSize:13,color:ACCENT}},"✓"):isToday?h("div",{style:{width:6,height:6,borderRadius:"50%",background:ACCENT}}):null
          )
        );
      })
    )
  );
}

function MuscleBalanceCard({history}){
  const mSets={Push:["Chest","Upper Chest","Shoulders","Side Delts","Front Delts","Triceps","Chest/Triceps"],Pull:["Back","Lats","Mid Back","Rear Delts","Biceps"],Legs:["Quads","Hamstrings","Glutes","Calves"]};
  const counts={Push:0,Pull:0,Legs:0};
  history.slice(0,8).forEach(s=>{const day=PLAN[s.name];if(!day)return;day.exercises.forEach(ex=>{for(const[g,ms]of Object.entries(mSets)){if(ms.includes(ex.muscle))counts[g]++;}});});
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  const ideal={Push:40,Pull:40,Legs:20};
  const gc={Push:"#FF6B35",Pull:"#8B5CF6",Legs:"#10B981"};
  return h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"14px 16px",marginBottom:10}},
    h("div",{style:{fontFamily:FONT,fontSize:10,letterSpacing:2.5,color:MUTED,marginBottom:12}},"MUSCLE BALANCE · LAST 8 SESSIONS"),
    Object.entries(counts).map(([grp,cnt])=>{
      const actual=Math.round((cnt/total)*100),target=ideal[grp],diff=actual-target;
      const status=Math.abs(diff)<=8?"balanced":diff>8?"over":"under";
      const sc=status==="balanced"?GREEN:status==="over"?AMBER:"#EF4444";
      return h("div",{key:grp,style:{marginBottom:10}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8}},
            h("div",{style:{width:8,height:8,borderRadius:2,background:gc[grp]}}),
            h("span",{style:{fontFamily:FONT,fontSize:13,color:TEXT}},grp.toUpperCase())
          ),
          h("div",{style:{display:"flex",alignItems:"center",gap:6}},
            h("span",{style:{fontSize:10,color:sc,fontFamily:FONT,letterSpacing:1}},status.toUpperCase()),
            h("span",{style:{fontFamily:FONT,fontSize:13,fontWeight:700,color:TEXT}},actual+"%"),
            h("span",{style:{fontSize:10,color:MUTED}},"/"+target+"%")
          )
        ),
        h("div",{style:{background:"#0D1117",borderRadius:4,height:7,overflow:"hidden",position:"relative"}},
          h("div",{style:{width:target+"%",height:"100%",background:`${gc[grp]}33`,borderRadius:4,position:"absolute"}}),
          h("div",{style:{width:Math.min(actual,100)+"%",height:"100%",background:gc[grp],borderRadius:4,position:"relative",zIndex:1}})
        )
      );
    })
  );
}

function BodyWeightInput({bodyWeight,setBodyWeight}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(String(bodyWeight));
  function confirm(){const n=parseFloat(val);if(!isNaN(n)&&n>30&&n<300)setBodyWeight(n);setEditing(false);}
  return h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}},
    h("div",null,
      h("div",{style:{fontFamily:FONT,fontSize:10,letterSpacing:2.5,color:MUTED,marginBottom:4}},"CURRENT WEIGHT"),
      editing
        ?h("div",{style:{display:"flex",alignItems:"center",gap:8}},
            h("input",{type:"number",value:val,onChange:e=>setVal(e.target.value),onKeyDown:e=>{if(e.key==="Enter")confirm();},autoFocus:true,style:{width:80,fontFamily:FONT,fontSize:20,fontWeight:800}}),
            h("span",{style:{fontFamily:FONT,fontSize:16,color:MUTED}},"kg"),
            h("button",{onClick:confirm,style:{background:ACCENT,border:"none",color:"#000",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontFamily:FONT,fontWeight:800,fontSize:12}},"SAVE")
          )
        :h("div",{style:{display:"flex",alignItems:"baseline",gap:6}},
            h("span",{style:{fontFamily:FONT,fontSize:28,fontWeight:800,color:TEXT}},bodyWeight),
            h("span",{style:{fontFamily:FONT,fontSize:14,color:MUTED}},"kg")
          )
    ),
    !editing&&h("button",{onClick:()=>{setVal(String(bodyWeight));setEditing(true);},style:{background:"transparent",border:`1px solid ${BORDER}`,color:MUTED,borderRadius:6,padding:"6px 14px",cursor:"pointer",fontFamily:FONT,fontSize:11,letterSpacing:1}},"UPDATE")
  );
}

function Dashboard({history,prs,streak,thisWeek,pendingDay,onRequest,onConfirm,onCancel,bodyWeight,setBodyWeight}){
  return h("div",{style:{paddingTop:14}},
    h(WeeklyQuote,null),
    h("div",{style:{display:"flex",gap:8,marginBottom:12}},
      h(SB,{label:"DAY STREAK",value:streak,sub:"keep going!",accent:ACCENT}),
      h(SB,{label:"THIS WEEK",value:thisWeek,sub:"of 4 planned"}),
      h(SB,{label:"TOTAL",value:history.length,sub:"sessions"})
    ),
    h(NextWorkoutCard,{history,pendingDay,onRequest,onConfirm,onCancel}),
    h("div",{style:{height:10}}),
    h(ThisWeekCard,{history}),
    h(BodyWeightInput,{bodyWeight,setBodyWeight}),
    h(MuscleBalanceCard,{history}),
    h("div",{style:{fontFamily:FONT,fontSize:10,letterSpacing:2.5,color:MUTED,marginBottom:10,marginTop:4}},"TOP RECORDS"),
    prs.map((pr,i)=>h("div",{key:i,style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
      h("div",null,
        h("div",{style:{fontFamily:FONT,fontSize:15,fontWeight:700,color:TEXT,letterSpacing:0.5}},pr.exercise.toUpperCase()),
        h("div",{style:{fontSize:11,color:MUTED,marginTop:2}},pr.date)
      ),
      h("div",{style:{textAlign:"right"}},
        h("div",{style:{fontFamily:FONT,fontSize:22,fontWeight:800,color:AMBER}},pr.weight),
        h("div",{style:{fontSize:11,color:MUTED}},pr.reps+" reps")
      )
    ))
  );
}

function WorkoutScreen({activeW,wSets,onToggle,onUpdate,onAdd,onFinish,onDiscard,pendingDay,onRequest,onConfirm,onCancel,elapsed,running}){
  const today=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
  if(!activeW)return h("div",{style:{paddingTop:20}},
    h("div",{style:{fontFamily:FONT,fontSize:12,letterSpacing:2.5,color:MUTED,marginBottom:12}},"START A SESSION"),
    h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
      Object.keys(PLAN).map(day=>h(DayButton,{key:day,day,pendingDay,onRequest,onConfirm,onCancel,sub:PLAN[day].exercises.length+" exercises"}))
    )
  );
  const warmup=["5 min treadmill warmup walk","Arm circles — 10 each direction","Hip circles — 10 each direction","Shoulder dislocates — 10 reps","Bodyweight squats — 10 reps"];
  const cool=["Chest doorway stretch — 30s each","Lat overhead stretch — 30s each","Quad stretch — 30s each","Child's pose — 60s","10 slow deep breaths"];
  return h("div",{style:{paddingTop:14}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      h("div",null,
        h("div",{style:{fontFamily:FONT,fontSize:20,fontWeight:800,letterSpacing:1,color:TEXT}},activeW.toUpperCase()),
        h("div",{style:{fontSize:11,color:MUTED,marginTop:2}},today)
      ),
      running&&h("div",{style:{fontFamily:FONT,fontSize:26,fontWeight:800,color:ACCENT,letterSpacing:3}},fmtTime(elapsed))
    ),
    h(Section,{label:"WARMUP · 5 MIN",items:warmup}),
    Object.keys(wSets).map(exName=>{
      const exData=PLAN[activeW].exercises.find(e=>e.name===exName);
      const sets=wSets[exName];const mc=MCOLORS[exData?.muscle]||ACCENT;
      return h("div",{key:exName,style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px",marginBottom:10}},
        h("div",{style:{marginBottom:10}},
          h("div",{style:{fontFamily:FONT,fontSize:15,fontWeight:800,color:TEXT}},exName.toUpperCase()),
          h("span",{style:{fontSize:11,background:`${mc}22`,color:mc,padding:"2px 8px",borderRadius:4,display:"inline-block",marginTop:4}},exData?.muscle)
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"22px 1fr 62px 52px 28px",gap:5,marginBottom:5}},
          ["SET","PREV","KG","REPS",""].map(l=>h("div",{key:l,style:{fontSize:9,color:MUTED,letterSpacing:1,fontFamily:FONT}},l))
        ),
        sets.map((set,idx)=>h("div",{key:idx,style:{display:"grid",gridTemplateColumns:"22px 1fr 62px 52px 28px",gap:5,marginBottom:5,padding:"3px 0",borderRadius:6,background:set.done?"rgba(34,197,94,0.07)":"transparent"}},
          h("div",{style:{fontFamily:FONT,fontSize:14,fontWeight:700,color:set.done?GREEN:MUTED,alignSelf:"center"}},idx+1),
          h("div",{style:{fontSize:11,color:MUTED,alignSelf:"center"}},idx===0?exData?.prev||"—":"—"),
          h("input",{type:"number",placeholder:"0",value:set.weight,onChange:e=>onUpdate(exName,idx,"weight",e.target.value),style:{borderColor:set.done?"rgba(34,197,94,0.4)":"#1E2530"}}),
          h("input",{type:"number",placeholder:"0",value:set.reps,onChange:e=>onUpdate(exName,idx,"reps",e.target.value),style:{borderColor:set.done?"rgba(34,197,94,0.4)":"#1E2530"}}),
          h("button",{className:`check-btn${set.done?" done":""}`,onClick:()=>onToggle(exName,idx)},set.done&&h("span",{style:{color:"#fff",fontSize:11,fontWeight:700}},"✓"))
        )),
        h("button",{className:"add-set-btn",onClick:()=>onAdd(exName),style:{marginTop:4}},"+ ADD SET")
      );
    }),
    h(Section,{label:"COOLDOWN · 5 MIN",items:cool}),
    h("div",{style:{display:"flex",gap:10,marginBottom:20,marginTop:4}},
      h("button",{className:"discard-btn",onClick:onDiscard},"DISCARD"),
      h("button",{className:"finish-btn",onClick:onFinish},"FINISH WORKOUT")
    )
  );
}

function Section({label,items}){
  return h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderLeft:"3px solid #2A3445",borderRadius:10,padding:"10px 12px",marginBottom:10}},
    h("div",{style:{fontFamily:FONT,fontSize:11,fontWeight:700,letterSpacing:2,color:MUTED,marginBottom:8}},label),
    items.map((item,i)=>h("div",{key:i,style:{fontSize:12,color:MUTED,padding:"3px 0",borderBottom:i<items.length-1?`1px solid ${BORDER}`:"none",display:"flex",alignItems:"center",gap:8}},
      h("span",{style:{color:"#2A3445",fontSize:8}},"●"),item
    ))
  );
}

function HistoryScreen({history,setHistory}){
  function del(id){if(confirm("Delete this session?"))setHistory(p=>p.filter(s=>s.id!==id));}
  return h("div",{style:{paddingTop:16}},
    h("div",{style:{fontFamily:FONT,fontSize:12,letterSpacing:2.5,color:MUTED,marginBottom:12}},"WORKOUT HISTORY"),
    history.length===0&&h("div",{style:{color:MUTED,textAlign:"center",padding:40}},"No sessions yet. Start your first workout!"),
    history.map(s=>{
      const color=PLAN[s.name]?.color||ACCENT;
      return h("div",{key:s.id,style:{background:CARD,border:`1px solid ${BORDER}`,borderLeft:`3px solid ${color}`,borderRadius:10,padding:"13px 14px",marginBottom:10}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
          h("div",null,
            h("div",{style:{display:"flex",alignItems:"center",gap:8}},
              h("div",{style:{fontFamily:FONT,fontSize:15,fontWeight:800,color:TEXT}},s.name.toUpperCase()),
              s.prs?.length>0&&h("span",null,"🏆")
            ),
            h("div",{style:{fontSize:11,color:MUTED,marginTop:3}},fmtDate(s.date))
          ),
          h("div",{style:{display:"flex",alignItems:"center",gap:10}},
            h("div",{style:{textAlign:"right"}},
              h("div",{style:{fontFamily:FONT,fontSize:16,fontWeight:700,color:TEXT}},s.duration+"min"),
              h("div",{style:{fontSize:11,color:MUTED}},s.sets+" sets")
            ),
            h("button",{onClick:()=>del(s.id),style:{background:"transparent",border:"none",color:"#EF444466",cursor:"pointer",fontSize:14,padding:"2px 4px"}},"✕")
          )
        ),
        h("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
          s.exercises.map(ex=>h("span",{key:ex,style:{fontSize:11,padding:"2px 8px",borderRadius:4,background:"rgba(30,37,48,0.6)",color:MUTED,border:`1px solid ${BORDER}`}},ex))
        )
      );
    })
  );
}

function ProgressScreen({history,bodyWeight}){
  const maxVol=Math.max(...WEEKLY_VOL.map(d=>d.volume));
  const wk=getWeekNum();
  const gained=Math.max(0,bodyWeight-SEED_WEIGHT);
  const pct=Math.min(100,Math.round((gained/6)*100));
  function sparkPath(data){
    const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
    const pts=data.map((v,i)=>({x:(i/(data.length-1))*100,y:100-((v-min)/range)*100}));
    return{pts,d:pts.map((p,i)=>`${i===0?"M":"L"}${p.x} ${p.y}`).join(" ")};
  }
  return h("div",{style:{paddingTop:16}},
    h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"14px 16px",marginBottom:14}},
      h("div",{style:{fontFamily:FONT,fontSize:10,letterSpacing:2.5,color:MUTED,marginBottom:12}},"BODY WEIGHT PROGRESS"),
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h("div",null,h("div",{style:{fontFamily:FONT,fontSize:32,fontWeight:800,color:TEXT}},bodyWeight,h("span",{style:{fontSize:14,color:MUTED}},"kg")),h("div",{style:{fontSize:11,color:MUTED}},"Current")),
        h("div",{style:{textAlign:"center"}},h("div",{style:{fontFamily:FONT,fontSize:22,fontWeight:800,color:pct>0?ACCENT:MUTED}},pct+"%"),h("div",{style:{fontSize:10,color:MUTED}},"of goal")),
        h("div",{style:{textAlign:"right"}},h("div",{style:{fontFamily:FONT,fontSize:32,fontWeight:800,color:ACCENT}},"75",h("span",{style:{fontSize:14,color:MUTED}},"kg")),h("div",{style:{fontSize:11,color:MUTED}},"Goal"))
      ),
      h("div",{style:{background:"#0D1117",borderRadius:6,height:10,overflow:"hidden"}},
        h("div",{style:{width:Math.max(2,pct)+"%",height:"100%",background:`linear-gradient(90deg,${ACCENT2},${ACCENT})`,borderRadius:6}})
      ),
      h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:6}},
        h("span",{style:{fontSize:10,color:MUTED,fontFamily:FONT}},"69kg start"),
        h("span",{style:{fontSize:10,color:MUTED,fontFamily:FONT}},"Week "+wk+" / 26"),
        h("span",{style:{fontSize:10,color:MUTED,fontFamily:FONT}},Math.max(0,75-bodyWeight).toFixed(1)+"kg to go")
      )
    ),
    h("div",{style:{fontFamily:FONT,fontSize:12,letterSpacing:2.5,color:MUTED,marginBottom:12}},"WEEKLY VOLUME BY MUSCLE"),
    h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"14px",marginBottom:14}},
      WEEKLY_VOL.map(({muscle,volume,color})=>h("div",{key:muscle,style:{marginBottom:10}},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
          h("div",{style:{fontFamily:FONT,fontSize:13,color:TEXT}},muscle.toUpperCase()),
          h("div",{style:{fontSize:11,color:MUTED}},(volume/1000).toFixed(1)+"k kg")
        ),
        h("div",{style:{background:"#0D1117",borderRadius:4,height:8,overflow:"hidden"}},
          h("div",{style:{width:((volume/maxVol)*100)+"%",height:"100%",background:color,borderRadius:4}})
        )
      ))
    ),
    h("div",{style:{fontFamily:FONT,fontSize:12,letterSpacing:2.5,color:MUTED,marginBottom:12}},"EXERCISE TRENDS"),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      Object.entries(SPARK).map(([name,data])=>{
        const{pts,d}=sparkPath(data);const cur=data[data.length-1],prev=data[data.length-2];
        const up=cur>=prev;const uid="g"+name.replace(/\s/g,"");
        return h("div",{key:name,style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px"}},
          h("div",{style:{fontFamily:FONT,fontSize:12,fontWeight:700,color:MUTED,marginBottom:6}},name.toUpperCase()),
          h("div",{style:{display:"flex",alignItems:"baseline",gap:5,marginBottom:6}},
            h("span",{style:{fontFamily:FONT,fontSize:24,fontWeight:800,color:TEXT}},cur+"kg"),
            h("span",{style:{fontSize:11,color:up?GREEN:"#EF4444"}},up?"▲ PR":"▼")
          ),
          h("svg",{viewBox:"0 0 100 60",style:{width:"100%",height:44,overflow:"visible"},preserveAspectRatio:"none"},
            h("defs",null,h("linearGradient",{id:uid,x1:"0",y1:"0",x2:"0",y2:"1"},h("stop",{offset:"0%",stopColor:ACCENT,stopOpacity:"0.25"}),h("stop",{offset:"100%",stopColor:ACCENT,stopOpacity:"0"}))),
            h("path",{d:d+` L100 100 L0 100 Z`,fill:`url(#${uid})`}),
            h("path",{d,fill:"none",stroke:ACCENT,strokeWidth:"2.5",strokeLinecap:"round",strokeLinejoin:"round"}),
            pts.map((p,i)=>h("circle",{key:i,cx:p.x,cy:p.y,r:i===pts.length-1?3:1.5,fill:i===pts.length-1?ACCENT:ACCENT+"77"}))
          )
        );
      })
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
