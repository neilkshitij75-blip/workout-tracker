<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Core">
<meta name="theme-color" content="#080A0F">
<title>Core — Ab Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080A0F;
  --card: #0E1118;
  --card2: #141820;
  --border: #1C2230;
  --accent: #C8F135;
  --accent2: #A8D420;
  --red: #FF4545;
  --amber: #FFB800;
  --blue: #3B82F6;
  --text: #EEF2FF;
  --muted: #5A6480;
  --muted2: #8892A8;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; min-height: -webkit-fill-available; }
button { font-family: var(--font-body); cursor: pointer; }
input { font-family: var(--font-body); }
::-webkit-scrollbar { display: none; }

/* TABS */
.tabs { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 100; }
.tab-btn { flex: 1; background: none; border: none; padding: 10px 4px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; opacity: 0.4; transition: opacity 0.2s; }
.tab-btn.active { opacity: 1; }
.tab-icon { font-size: 18px; line-height: 1; }
.tab-label { font-family: var(--font-display); font-size: 9px; letter-spacing: 1.5px; color: var(--muted2); }
.tab-btn.active .tab-label { color: var(--accent); }
.tab-btn.active .tab-icon { filter: drop-shadow(0 0 6px var(--accent)); }

/* PAGES */
.page { display: none; padding: 0 14px; padding-bottom: calc(80px + var(--safe-bottom)); max-width: 600px; margin: 0 auto; }
.page.active { display: block; }

/* HEADER */
.app-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; position: sticky; top: 0; z-index: 50; }
.header-row { display: flex; justify-content: space-between; align-items: flex-start; }
.app-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 3px; color: var(--accent); line-height: 1; }
.app-sub { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; margin-top: 2px; }
.header-stat { text-align: right; }
.header-stat-val { font-family: var(--font-display); font-size: 22px; color: var(--text); line-height: 1; }
.header-stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

/* CARDS */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.card-accent { border-left: 4px solid var(--accent); }
.section-label { font-family: var(--font-display); font-size: 11px; letter-spacing: 2.5px; color: var(--muted); margin-bottom: 10px; margin-top: 4px; }

/* STAT BOXES */
.stat-row { display: flex; gap: 8px; margin-bottom: 12px; }
.stat-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 10px; flex: 1; }
.stat-val { font-family: var(--font-display); font-size: 28px; color: var(--text); line-height: 1; }
.stat-val.accent { color: var(--accent); }
.stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; margin-top: 4px; }
.stat-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* WEEK GRID */
.week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
.week-cell { text-align: center; }
.week-day { font-family: var(--font-display); font-size: 9px; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
.week-dot { height: 34px; border-radius: 8px; background: var(--card2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.2s; }
.week-dot.done { background: rgba(200,241,53,0.15); border-color: rgba(200,241,53,0.4); }
.week-dot.today { border: 2px solid var(--accent); }
.week-dot.rest { background: rgba(255,184,0,0.1); border-color: rgba(255,184,0,0.3); }

/* PROGRESS BAR */
.prog-row { margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
.prog-label { font-family: var(--font-display); font-size: 10px; letter-spacing: 1px; color: var(--muted); }
.prog-val { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: var(--text); }
.prog-bar { background: #0D1117; border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: 8px; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

/* EXERCISE CARDS */
.ex-card { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
.ex-card.active-ex { border-color: var(--accent); background: rgba(200,241,53,0.04); }
.ex-card.done-ex { border-left-color: #22C55E; background: rgba(34,197,94,0.04); opacity: 0.7; }
.ex-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 14px; cursor: pointer; }
.ex-name { font-family: var(--font-display); font-size: 16px; letter-spacing: 0.5px; color: var(--text); }
.ex-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.ex-badge { font-family: var(--font-display); font-size: 9px; letter-spacing: 1.5px; padding: 3px 8px; border-radius: 4px; }
.badge-sets { background: rgba(200,241,53,0.12); color: var(--accent); border: 1px solid rgba(200,241,53,0.25); }
.badge-done { background: rgba(34,197,94,0.12); color: #22C55E; border: 1px solid rgba(34,197,94,0.25); }
.badge-active { background: rgba(255,184,0,0.12); color: var(--amber); border: 1px solid rgba(255,184,0,0.25); }

/* SET ROWS */
.ex-body { border-top: 1px solid var(--border); padding: 10px 14px 12px; }
.set-header { display: grid; grid-template-columns: 28px 1fr auto 28px; gap: 8px; margin-bottom: 6px; }
.set-col-label { font-family: var(--font-display); font-size: 9px; letter-spacing: 1px; color: var(--muted); }
.set-row { display: grid; grid-template-columns: 28px 1fr auto 28px; gap: 8px; align-items: center; padding: 5px 0; border-radius: 6px; transition: background 0.15s; }
.set-row.set-done { background: rgba(34,197,94,0.06); }
.set-num { font-family: var(--font-display); font-size: 14px; color: var(--muted); text-align: center; }
.set-num.done { color: #22C55E; }
.set-info { font-size: 12px; color: var(--text); }
.set-info small { display: block; font-size: 10px; color: var(--muted); margin-top: 1px; }
.set-timer-btn { background: rgba(200,241,53,0.1); border: 1px solid rgba(200,241,53,0.25); color: var(--accent); border-radius: 6px; padding: 5px 10px; font-size: 11px; font-family: var(--font-display); letter-spacing: 0.5px; transition: all 0.15s; white-space: nowrap; }
.set-timer-btn:active { background: rgba(200,241,53,0.25); }
.set-check { width: 26px; height: 26px; border-radius: 6px; border: 2px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; cursor: pointer; }
.set-check.checked { background: #22C55E; border-color: #22C55E; }

/* REST TIMER */
.rest-banner { background: rgba(255,184,0,0.08); border: 1px solid rgba(255,184,0,0.3); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
.rest-title { font-family: var(--font-display); font-size: 12px; letter-spacing: 1.5px; color: var(--amber); }
.rest-countdown { font-family: var(--font-display); font-size: 26px; color: var(--amber); letter-spacing: 2px; }
.rest-skip { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-family: var(--font-display); letter-spacing: 1px; }

/* WORK TIMER */
.work-banner { background: rgba(200,241,53,0.06); border: 1px solid rgba(200,241,53,0.3); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.work-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.work-title { font-family: var(--font-display); font-size: 12px; letter-spacing: 1.5px; color: var(--accent); }
.work-timer { font-family: var(--font-display); font-size: 32px; color: var(--accent); letter-spacing: 3px; }
.work-stop { background: rgba(255,69,69,0.15); border: 1px solid rgba(255,69,69,0.3); color: var(--red); border-radius: 6px; padding: 4px 12px; font-size: 11px; font-family: var(--font-display); letter-spacing: 1px; }
.timer-progress { background: #0D1117; border-radius: 4px; height: 6px; overflow: hidden; }
.timer-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.1s linear; }

/* INFO CARD */
.info-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-right: 5px; margin-bottom: 5px; }
.tip-card { background: #0D1117; border-radius: 8px; padding: 10px 12px; margin-top: 10px; }
.tip-step { display: flex; gap: 8px; margin-bottom: 5px; }
.tip-num { font-family: var(--font-display); font-size: 11px; color: var(--accent); flex-shrink: 0; margin-top: 1px; }
.tip-text { font-size: 12px; color: var(--muted2); line-height: 1.5; }

/* HISTORY */
.hist-entry { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.hist-date { font-family: var(--font-display); font-size: 14px; color: var(--text); letter-spacing: 0.5px; }
.hist-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.hist-badge { font-family: var(--font-display); font-size: 18px; color: var(--accent); font-weight: 800; }

/* BUTTONS */
.btn-primary { background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 13px 0; font-family: var(--font-display); font-size: 16px; letter-spacing: 2px; width: 100%; transition: opacity 0.15s; }
.btn-primary:active { opacity: 0.85; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted2); border-radius: 10px; padding: 11px 0; font-family: var(--font-display); font-size: 14px; letter-spacing: 1.5px; width: 100%; transition: all 0.15s; }
.btn-outline:active { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); border-radius: 10px; padding: 11px 0; font-family: var(--font-display); font-size: 14px; letter-spacing: 1.5px; transition: all 0.15s; }
.btn-row { display: flex; gap: 10px; margin-top: 4px; }
.btn-row > * { flex: 1; }

/* QUOTE */
.quote-card { background: linear-gradient(135deg, rgba(200,241,53,0.06), rgba(200,241,53,0.02)); border: 1px solid rgba(200,241,53,0.15); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; position: relative; overflow: hidden; }
.quote-accent { position: absolute; top: -10px; right: 10px; font-family: var(--font-display); font-size: 80px; color: rgba(200,241,53,0.06); line-height: 1; pointer-events: none; }
.quote-week { font-family: var(--font-display); font-size: 9px; letter-spacing: 2.5px; color: var(--accent); margin-bottom: 6px; }
.quote-text { font-family: var(--font-display); font-size: 16px; color: var(--text); line-height: 1.4; letter-spacing: 0.3px; }
.quote-author { font-size: 11px; color: var(--muted); margin-top: 6px; }

/* VOLUME CHART */
.vol-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.vol-bar-label { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.5px; color: var(--muted2); width: 22px; text-align: right; flex-shrink: 0; }
.vol-bar-track { flex: 1; background: #0D1117; border-radius: 3px; height: 7px; overflow: hidden; }
.vol-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }
.vol-bar-val { font-family: var(--font-display); font-size: 10px; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }

/* NOTIFICATION DOT */
.notif-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); position: absolute; top: 8px; right: 8px; }

/* MODAL OVERLAY */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal-sheet { background: var(--card); border-radius: 20px 20px 0 0; padding: 20px 16px 40px; width: 100%; max-width: 600px; border-top: 1px solid var(--border); }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-family: var(--font-display); font-size: 18px; letter-spacing: 1px; color: var(--text); margin-bottom: 14px; }

/* COMPLETE OVERLAY */
.complete-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
.complete-card { background: var(--card); border: 1px solid rgba(200,241,53,0.3); border-radius: 20px; padding: 32px 24px; text-align: center; max-width: 320px; width: 90%; }
.complete-icon { font-size: 56px; margin-bottom: 16px; }
.complete-title { font-family: var(--font-display); font-size: 32px; letter-spacing: 2px; color: var(--accent); margin-bottom: 8px; }
.complete-sub { font-size: 13px; color: var(--muted2); line-height: 1.6; margin-bottom: 20px; }
.complete-stats { display: flex; gap: 12px; margin-bottom: 20px; }
.complete-stat { flex: 1; background: var(--card2); border-radius: 10px; padding: 10px; }
.complete-stat-val { font-family: var(--font-display); font-size: 22px; color: var(--accent); }
.complete-stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }



</style>

// Rest days recommendation: rest every 3rd day
// ── STATE ───────────────────────────────────────────────────────────────────
function loadData() {
  try { const r = localStorage.getItem(SKEY); return r ? JSON.parse(r) : {}; }
  catch(e) { return {}; }
}
function saveData(d) {
  try { localStorage.setItem(SKEY, JSON.stringify(d)); } catch(e) {}
}
function getData() {
  const d = loadData();
  if (!d.history) d.history = [];   // [{date:'2025-05-04', sets:9, duration:14, exercises:3}]
  if (!d.prs) d.prs = {};           // {deadbug: {reps:12,date:'...'}, hollow:{duration:45,...}}
  return d;
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmtDate(iso) { return new Date(iso).toLocaleDateString('en-GB', {day:'numeric',month:'short'}); }
function fmtTime(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

function calcStreak(history) {
  if (!history.length) return 0;
  const sorted = [...history].sort((a,b) => b.date.localeCompare(a.date));
  const unique = [...new Set(sorted.map(s => s.date))];
  const today = todayStr();
  const yest = new Date(); yest.setDate(yest.getDate()-1);
  const yISO = yest.toISOString().split('T')[0];
  if (unique[0] !== today && unique[0] !== yISO) return 0;
  let streak = 0;
  let check = new Date(unique[0]);
  for (const d of unique) {
    if (d === check.toISOString().split('T')[0]) { streak++; check.setDate(check.getDate()-1); }
    else break;
  }
  return streak;
}

function isRestDay(history) {
  // Recommend rest if trained 3+ days in a row
  const sorted = [...history].sort((a,b) => b.date.localeCompare(a.date));
  const unique = [...new Set(sorted.map(s => s.date))];
  if (unique.length < 3) return false;
  // Check if last 3 sessions were consecutive
  let consec = 0;
  let check = new Date(todayStr()); check.setDate(check.getDate()-1);
  for (const d of unique) {
    if (d === check.toISOString().split('T')[0]) { consec++; check.setDate(check.getDate()-1); }
    else break;
  }
  return consec >= 2;
}

// ── WORKOUT SESSION STATE ───────────────────────────────────────────────────
let session = null;
let timerInterval = null;
let workTimerInterval = null;
let restTimerSeconds = 0;
let workTimerSeconds = 0;
let workTimerTarget = 0;
let activeWorkTimer = null; // {exIdx, setIdx}

function startSession() {
  session = {
    startTime: Date.now(),
    elapsed: 0,
    sets: EXERCISES.map(ex => Array(ex.sets).fill(false)),
    complete: false
  };
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (session) { session.elapsed++; renderWorkout(); }
  }, 1000);
  renderWorkout();
}

function toggleSet(exIdx, setIdx) {
  if (!session) return;
  const wasComplete = session.sets[exIdx][setIdx];
  session.sets[exIdx][setIdx] = !wasComplete;
  if (!wasComplete) {
    // set just completed — check if we should start rest timer
    const ex = EXERCISES[exIdx];
    startRestTimer(ex.rest);
    // update PRs
    updatePR(ex, setIdx);
  }
  renderWorkout();
}

function updatePR(ex, setIdx) {
  const d = getData();
  const today = todayStr();
  if (ex.type === 'reps') {
    if (!d.prs[ex.id] || ex.reps > d.prs[ex.id].reps) {
      d.prs[ex.id] = { reps: ex.reps, date: today };
    }
  } else {
    if (!d.prs[ex.id] || ex.duration > d.prs[ex.id].duration) {
      d.prs[ex.id] = { duration: ex.duration, date: today };
    }
  }
  saveData(d);
}

let restSecs = 0;
let restInterval = null;
function startRestTimer(seconds) {
  clearInterval(restInterval);
  restSecs = seconds;
  renderRestBanner(restSecs);
  restInterval = setInterval(() => {
    restSecs--;
    if (restSecs <= 0) {
      clearInterval(restInterval);
      restSecs = 0;
      hideRestBanner();
    } else {
      renderRestBanner(restSecs);
    }
  }, 1000);
}
function skipRest() {
  clearInterval(restInterval);
  restSecs = 0;
  hideRestBanner();
}

let workSecs = 0;
let workTarget = 0;
let workInterval = null;
let workExIdx = null;
let workSetIdx = null;

function startWorkTimer(exIdx, setIdx, targetSecs) {
  clearInterval(workInterval);
  workSecs = 0;
  workTarget = targetSecs;
  workExIdx = exIdx;
  workSetIdx = setIdx;
  renderWorkBanner(workSecs, workTarget);
  workInterval = setInterval(() => {
    workSecs++;
    if (workSecs >= workTarget) {
      clearInterval(workInterval);
      // auto-complete set
      if (session) {
        session.sets[exIdx][setIdx] = true;
        updatePR(EXERCISES[exIdx], setIdx);
        startRestTimer(EXERCISES[exIdx].rest);
      }
      workExIdx = null; workSetIdx = null;
      hideWorkBanner();
      renderWorkout();
    } else {
      renderWorkBanner(workSecs, workTarget);
    }
  }, 1000);
}
function stopWorkTimer() {
  clearInterval(workInterval);
  workExIdx = null; workSetIdx = null;
  hideWorkBanner();
  renderWorkout();
}

function finishSession() {
  if (!session) return;
  clearInterval(timerInterval);
  const totalSets = session.sets.flat().filter(Boolean).length;
  const duration = Math.max(1, Math.floor((Date.now() - session.startTime) / 60000));
  const d = getData();
  d.history.push({
    date: todayStr(),
    sets: totalSets,
    duration,
    exercises: EXERCISES.filter((_,i) => session.sets[i].some(Boolean)).length
  });
  saveData(d);
  showComplete(totalSets, duration);
  session = null;
  clearInterval(timerInterval);
}

function discardSession() {
  clearInterval(timerInterval);
  clearInterval(restInterval);
  clearInterval(workInterval);
  session = null;
  restSecs = 0;
  workExIdx = null; workSetIdx = null;
  renderWorkout();
}

function renderProgress() {
  const d = getData();
  const history = d.history || [];
  const prs = d.prs || {};

  // Weekly volume (sessions per week for last 8 weeks)
  const weeks = [];
  for (let i = 7; i >= 0; i--) {
    const wStart = new Date();
    wStart.setDate(wStart.getDate() - wStart.getDay() - (i * 7) + (wStart.getDay() === 0 ? -6 : 1));
    wStart.setHours(0,0,0,0);
    const wEnd = new Date(wStart);
    wEnd.setDate(wStart.getDate() + 6);
    wEnd.setHours(23,59,59,999);
    const count = [...new Set(history.filter(s => {
      const d = new Date(s.date);
      return d >= wStart && d <= wEnd;
    }).map(s => s.date))].length;
    weeks.push({ label: `W${8-i}`, count });
  }
  const maxWeek = Math.max(...weeks.map(w=>w.count), 5);

  const totalSessions = [...new Set(history.map(s=>s.date))].length;
  const totalSets = history.reduce((a,s) => a+s.sets, 0);
  const avgDuration = history.length ? Math.round(history.reduce((a,s)=>a+s.duration,0)/history.length) : 0;
  const streak = calcStreak(history);

  const prsHTML = EXERCISES.map(ex => {
    const pr = prs[ex.id];
    if (!pr) return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
      <div style="font-family:var(--font-display);font-size:13px;color:var(--text)">${ex.name}</div>
      <div style="font-size:11px;color:var(--muted)">No PR yet</div>
    </div>`;
    const val = ex.type === 'reps' ? `${pr.reps} reps` : `${pr.duration}s`;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-family:var(--font-display);font-size:13px;color:var(--text)">${ex.name}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${fmtDate(pr.date)}</div>
      </div>
      <div style="font-family:var(--font-display);font-size:18px;color:var(--accent)">${val}</div>
    </div>`;
  }).join('');

  const histHTML = [...new Set(history.map(s=>s.date))].sort((a,b)=>b.localeCompare(a)).slice(0,15).map(date => {
    const sessions = history.filter(s=>s.date===date);
    const sets = sessions.reduce((a,s)=>a+s.sets,0);
    const duration = sessions.reduce((a,s)=>a+s.duration,0);
    return `<div class="hist-entry">
      <div>
        <div class="hist-date">${fmtDate(date)}</div>
        <div class="hist-sub">${sets} sets · ${duration} min</div>
      </div>
      <div class="hist-badge">${sets}</div>
    </div>`;
  }).join('') || '<div style="color:var(--muted);text-align:center;padding:30px">No sessions logged yet</div>';

  const weekBarsHTML = weeks.map(w => `
    <div class="vol-bar-row">
      <div class="vol-bar-label">${w.label}</div>
      <div class="vol-bar-track"><div class="vol-bar-fill" style="width:${w.count===0?0:Math.max(8,(w.count/maxWeek)*100)}%"></div></div>
      <div class="vol-bar-val">${w.count}</div>
    </div>`).join('');

  const html = `
    <div style="padding-top:14px">
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-val accent">${streak}</div>
        <div class="stat-lbl">STREAK</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${totalSessions}</div>
        <div class="stat-lbl">SESSIONS</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${totalSets}</div>
        <div class="stat-lbl">TOTAL SETS</div>
      </div>
    </div>

    <div class="section-label">SESSIONS PER WEEK</div>
    <div class="card" style="margin-bottom:12px">${weekBarsHTML}</div>

    <div class="section-label">PERSONAL RECORDS</div>
    <div class="card" style="margin-bottom:12px">${prsHTML}</div>

    <div class="section-label">SESSION HISTORY</div>
    ${histHTML}

    <div class="section-label">BACKUP & RESTORE</div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Export your data to back it up, or import a previous backup.</div>
      <div class="btn-row">
        <button class="btn-outline" id="export-btn" onclick="exportData()">EXPORT</button>
        <button class="btn-outline" onclick="showImportModal()">IMPORT</button>
      </div>
    </div>

    <div class="card" style="margin-top:8px;margin-bottom:8px;text-align:center">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Reset all data</div>
      <button class="btn-danger" style="padding:8px 20px;font-size:12px;border-radius:8px;width:auto" onclick="if(confirm('Delete all data? This cannot be undone.'))resetData()">RESET DATA</button>
    </div>
    </div>`;

  document.getElementById('page-progress').innerHTML = html;
}

function resetData() {
  try { localStorage.removeItem(SKEY); } catch(e) {}
  renderHome(); renderProgress();
}

// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportData() {
  const raw = localStorage.getItem(SKEY) || '{}';
  const btn = document.getElementById('export-btn');
  function showCopied() {
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = 'COPIED!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(raw).then(showCopied).catch(() => showExportFallback(raw));
  } else {
    showExportFallback(raw);
  }
}

function showExportFallback(raw) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'export-fallback-overlay';
  overlay.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">COPY YOUR DATA</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Clipboard unavailable — tap the box, select all, and copy manually:</div>
      <textarea readonly id="export-fallback-text" style="width:100%;height:140px;background:#0D1117;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;padding:10px;font-family:monospace"></textarea>
      <button class="btn-outline" style="margin-top:12px" onclick="document.getElementById('export-fallback-overlay').remove()">CLOSE</button>
    </div>`;
  document.body.appendChild(overlay);
  const ta = document.getElementById('export-fallback-text');
  ta.value = raw;
  ta.focus(); ta.select();
}

function showImportModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'import-overlay';
  overlay.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">IMPORT DATA</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Paste previously exported JSON. This will overwrite your current Core data on this device.</div>
      <textarea id="import-text" placeholder="Paste here..." style="width:100%;height:140px;background:#0D1117;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;padding:10px;font-family:monospace"></textarea>
      <div id="import-err" style="color:var(--red);font-size:11px;margin-top:6px"></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn-outline" onclick="document.getElementById('import-overlay').remove()">CANCEL</button>
        <button class="btn-primary" onclick="submitImport()">OVERWRITE & IMPORT</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function submitImport() {
  const text = document.getElementById('import-text').value;
  const errEl = document.getElementById('import-err');
  let parsed;
  try { parsed = JSON.parse(text); }
  catch (e) { errEl.textContent = "That doesn't look like valid JSON."; return; }
  if (!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.history)) {
    errEl.textContent = "This doesn't look like a Core export — missing a history list.";
    return;
  }
  if (!confirm('This will overwrite your current Core data on this device. Continue?')) return;
  localStorage.setItem(SKEY, JSON.stringify(parsed));
  document.getElementById('import-overlay').remove();
  renderHome(); renderProgress();
}

// ── TAB SWITCHING ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'home') renderHome();
  if (tab === 'workout') renderWorkout();
  if (tab === 'progress') renderProgress();
  window.scrollTo(0,0);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
