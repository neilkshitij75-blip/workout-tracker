  const [selDay,setSelDay]=useState(()=>{const d=new Date().getDay();return d===0?0:d;});
  const [expanded,setExpanded]=useState(null);
  const [showSupp,setShowSupp]=useState(false);
  const day=MEAL_PLAN[selDay];
  const visibleMeals=day.meals.filter(m=>m.type!=="Batch Cook");
  const batchMeal=day.meals.find(m=>m.type==="Batch Cook");
  const dayTotals=visibleMeals.reduce((a,m)=>({kcal:a.kcal+m.kcal,protein:a.protein+m.protein}),{kcal:0,protein:0});
  const kcalPct=Math.min(100,Math.round((dayTotals.kcal/KCAL_TARGET)*100));
  const protPct=Math.min(100,Math.round((dayTotals.protein/PROTEIN_TARGET)*100));
  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const todayDow=new Date().getDay();
  const wk=getWeekNum();
  const quote=QUOTES[wk%QUOTES.length];

  return h("div",{style:{paddingTop:14}},
    // Quote
    h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderLeft:`3px solid ${GREEN}`,borderRadius:10,padding:"12px 14px",marginBottom:12,position:"relative",overflow:"hidden"}},
      h("div",{style:{position:"absolute",top:-8,right:8,fontFamily:FONT,fontSize:70,color:`${GREEN}08`,lineHeight:1,pointerEvents:"none"}},"\u201C"),
      h("div",{style:{fontFamily:FONT,fontSize:9,letterSpacing:2.5,color:GREEN,marginBottom:6}},"WEEK "+(wk+1)+" · NUTRITION"),
      h("div",{style:{fontFamily:FONT,fontSize:15,fontWeight:700,color:TEXT,lineHeight:1.4}}),
      h("div",{style:{fontSize:13,color:MUTED2,lineHeight:1.5,fontStyle:"italic"}},"\u201C"+quote.text+"\u201D"),
      h("div",{style:{fontSize:11,color:MUTED,marginTop:6}}),h("span",null,"\u2014 "+quote.attr)
    ),
    // Targets + supplement toggle
    h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 14px",marginBottom:12}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        h("div",{style:{fontFamily:FONT,fontSize:10,letterSpacing:2.5,color:MUTED}},"DAILY TARGETS"),
        h("button",{onClick:()=>setShowSupp(!showSupp),style:{background:showSupp?`${GREEN}20`:"transparent",border:`1px solid ${showSupp?GREEN+"44":BORDER}`,borderRadius:6,padding:"3px 10px",cursor:"pointer",fontFamily:FONT,fontSize:9,letterSpacing:1,color:showSupp?GREEN:MUTED,transition:"all 0.2s"}},showSupp?"HIDE":"SUPPS")
      ),
      showSupp&&h("div",{style:{background:"#0D1117",borderRadius:8,padding:"10px 12px",marginBottom:10,fontSize:12,color:MUTED2,lineHeight:1.6,borderLeft:`3px solid ${GREEN}`}},SUPPLEMENT_INFO),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1px 1fr 1px 1fr",gap:8,alignItems:"center"}},
        h("div",{style:{textAlign:"center"}},
          h("div",{style:{fontFamily:FONT,fontSize:24,fontWeight:800,color:TEXT,lineHeight:1}},KCAL_TARGET),
          h("div",{style:{fontSize:10,color:MUTED,marginTop:3,letterSpacing:0.5}},"KCAL / DAY")
        ),
        h("div",{style:{height:30,background:BORDER}}),
        h("div",{style:{textAlign:"center"}},
          h("div",{style:{fontFamily:FONT,fontSize:24,fontWeight:800,color:GREEN,lineHeight:1}},PROTEIN_TARGET+"g"),
          h("div",{style:{fontSize:10,color:MUTED,marginTop:3,letterSpacing:0.5}},"PROTEIN / DAY")
        ),
        h("div",{style:{height:30,background:BORDER}}),
        h("div",{style:{textAlign:"center"}},
          h("div",{style:{fontFamily:FONT,fontSize:24,fontWeight:800,color:AMBER,lineHeight:1}},"\u20ac70"),
          h("div",{style:{fontSize:10,color:MUTED,marginTop:3,letterSpacing:0.5}},"BUDGET / WEEK")
        )
      )
    ),
    // Day selector
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:12}},
      dayNames.map((d,i)=>{
        const plan=MEAL_PLAN[i];const isToday=i===todayDow;const isSel=selDay===i;
        return h("button",{key:d,onClick:()=>{setSelDay(i);setExpanded(null);},style:{background:isSel?`${GREEN}22`:isToday&&!isSel?`${AMBER}10`:CARD,border:`2px solid ${isSel?GREEN:isToday&&!isSel?AMBER+"55":BORDER}`,borderRadius:8,padding:"7px 2px",cursor:"pointer",textAlign:"center",position:"relative",transition:"all 0.15s"}},
          plan.prep&&h("div",{style:{position:"absolute",top:3,right:3,width:5,height:5,borderRadius:"50%",background:AMBER}}),
          h("div",{style:{fontFamily:FONT,fontSize:10,fontWeight:isSel||isToday?800:400,color:isSel?GREEN:isToday?AMBER:MUTED,letterSpacing:0.5}},d.toUpperCase()),
          h("div",{style:{fontFamily:FONT,fontSize:7,color:isSel?GREEN+"99":MUTED,marginTop:2}},plan.prep?"PREP":"")
        );
      })
    ),
    // Prep banner
    day.prep&&h("div",{style:{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:8,padding:"8px 12px",marginBottom:10,display:"flex",alignItems:"center",gap:8}},
      h("span",{style:{fontFamily:FONT,fontSize:11,fontWeight:700,letterSpacing:1,color:AMBER}},"PREP DAY"),
      h("span",{style:{fontSize:11,color:MUTED}},"— batch cook today to cover the next 3 days")
    ),
    // Day summary card
    h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:"12px 14px",marginBottom:12}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${BORDER}`}},
        h("div",null,
          h("div",{style:{fontFamily:FONT,fontSize:20,fontWeight:800,color:TEXT,letterSpacing:0.5}},day.day.toUpperCase()),
          h("div",{style:{fontSize:11,color:MUTED,marginTop:2}},day.theme)
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontFamily:FONT,fontSize:15,fontWeight:700,color:TEXT}},dayTotals.kcal+" kcal"),
          h("div",{style:{fontSize:11,color:GREEN,marginTop:1}},dayTotals.protein+"g protein")
        )
      ),
      h("div",{style:{marginBottom:8}},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
          h("span",{style:{fontSize:10,color:MUTED,fontFamily:FONT,letterSpacing:1}},"CALORIES"),
          h("span",{style:{fontSize:11,color:kcalPct>=95?"#22C55E":TEXT,fontFamily:FONT,fontWeight:700}},dayTotals.kcal+" / "+KCAL_TARGET)
        ),
        h("div",{style:{background:"#0D1117",borderRadius:4,height:8,overflow:"hidden"}},
          h("div",{style:{width:kcalPct+"%",height:"100%",background:`linear-gradient(90deg,${ACCENT2},${GREEN})`,borderRadius:4,transition:"width 0.4s"}})
        )
      ),
      h("div",null,
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
          h("span",{style:{fontSize:10,color:MUTED,fontFamily:FONT,letterSpacing:1}},"PROTEIN"),
          h("span",{style:{fontSize:11,color:protPct>=95?"#22C55E":TEXT,fontFamily:FONT,fontWeight:700}},dayTotals.protein+"g / "+PROTEIN_TARGET+"g")
        ),
        h("div",{style:{background:"#0D1117",borderRadius:4,height:8,overflow:"hidden"}},
          h("div",{style:{width:protPct+"%",height:"100%",background:GREEN,borderRadius:4,transition:"width 0.4s"}})
        )
      )
    ),
    // Meal cards
    visibleMeals.map((meal,mi)=>{
      const isOpen=expanded===mi;const mc=MEAL_COLORS[meal.type]||GREEN;
      return h("div",{key:mi,style:{background:isOpen?`${mc}06`:CARD,border:`1px solid ${isOpen?mc+"55":BORDER}`,borderLeft:`4px solid ${mc}`,borderRadius:10,marginBottom:8,overflow:"hidden",transition:"all 0.2s"}},
        h("button",{onClick:()=>setExpanded(isOpen?null:mi),style:{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"13px 14px",textAlign:"left"}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("div",{style:{flex:1,minWidth:0}},
              h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},
                h("span",{style:{fontFamily:FONT,fontSize:9,letterSpacing:1.5,color:mc,background:`${mc}18`,border:`1px solid ${mc}30`,borderRadius:4,padding:"2px 7px"}},meal.type.toUpperCase()),
                meal.prepNote&&h("span",{style:{fontSize:9,background:"rgba(245,158,11,0.12)",color:AMBER,border:"1px solid rgba(245,158,11,0.25)",borderRadius:3,padding:"1px 5px",fontFamily:FONT}},"BATCH")
              ),
              h("div",{style:{fontFamily:FONT,fontSize:15,fontWeight:800,color:TEXT,letterSpacing:0.3}},meal.name),
              h("div",{style:{fontSize:11,color:MUTED,marginTop:2}},meal.time)
            ),
            h("div",{style:{textAlign:"right",flexShrink:0,marginLeft:10}},
              meal.kcal>0&&h("div",{style:{fontFamily:FONT,fontSize:13,fontWeight:700,color:TEXT}},meal.kcal+" kcal"),
              meal.protein>0&&h("div",{style:{fontSize:11,color:GREEN}},meal.protein+"g"),
              h("div",{style:{fontSize:10,color:MUTED,marginTop:2}},isOpen?"\u25B2":"\u25BC")
            )
          )
        ),
        isOpen&&h("div",{style:{padding:"0 14px 14px",borderTop:`1px solid ${BORDER}`}},
          meal.prepNote&&h("div",{style:{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:6,padding:"7px 10px",marginTop:10,marginBottom:10,fontSize:12,color:AMBER}},meal.prepNote),
          h("div",{style:{marginTop:10,marginBottom:10}},
            h("div",{style:{fontFamily:FONT,fontSize:9,letterSpacing:2,color:MUTED,marginBottom:7}},"INGREDIENTS"),
            h("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
              meal.ingredients.map((ing,ii)=>h("span",{key:ii,style:{fontSize:11,background:`${mc}12`,color:mc,border:`1px solid ${mc}25`,borderRadius:4,padding:"3px 8px"}},ing))
            )
          ),
          h("div",null,
            h("div",{style:{fontFamily:FONT,fontSize:9,letterSpacing:2,color:MUTED,marginBottom:7}},"STEPS"),
            meal.steps.map((step,si)=>h("div",{key:si,style:{display:"flex",gap:8,marginBottom:7}},
              h("div",{style:{fontFamily:FONT,fontSize:11,fontWeight:800,color:mc,flexShrink:0,minWidth:16}}),h("span",{style:{fontFamily:FONT,fontSize:11,fontWeight:800,color:mc,flexShrink:0}},si+1+"."),
              h("div",{style:{fontSize:12,color:TEXT,lineHeight:1.6}},step)
            ))
          )
        )
      );
    }),
    // Batch cook card
    batchMeal&&h("div",{style:{background:expanded==="batch"?`${AMBER}06`:CARD,border:`1px solid ${expanded==="batch"?AMBER+"55":AMBER+"25"}`,borderLeft:`4px solid ${AMBER}`,borderRadius:10,marginBottom:10,overflow:"hidden"}},
      h("button",{onClick:()=>setExpanded(expanded==="batch"?null:"batch"),style:{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:"13px 14px",textAlign:"left"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("div",{style:{flex:1}},
            h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},
              h("span",{style:{fontFamily:FONT,fontSize:9,letterSpacing:1.5,color:AMBER,background:`${AMBER}18`,border:`1px solid ${AMBER}30`,borderRadius:4,padding:"2px 7px"}},"BATCH COOK"),
              h("span",{style:{fontSize:9,background:"rgba(34,197,94,0.12)",color:"#22C55E",border:"1px solid rgba(34,197,94,0.25)",borderRadius:3,padding:"1px 5px",fontFamily:FONT}},"DO THIS TODAY")
            ),
            h("div",{style:{fontFamily:FONT,fontSize:15,fontWeight:800,color:TEXT}},"Full Prep Instructions"),
            h("div",{style:{fontSize:11,color:MUTED,marginTop:2}},batchMeal.time)
          ),
          h("div",{style:{fontSize:10,color:MUTED}},expanded==="batch"?"\u25B2":"\u25BC")
        )
      ),
      expanded==="batch"&&h("div",{style:{padding:"0 14px 14px",borderTop:`1px solid ${BORDER}`}},
        h("div",{style:{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:6,padding:"7px 10px",marginTop:10,marginBottom:10,fontSize:12,color:AMBER}},batchMeal.prepNote),
        h("div",{style:{marginTop:10,marginBottom:10}},
          h("div",{style:{fontFamily:FONT,fontSize:9,letterSpacing:2,color:MUTED,marginBottom:7}},"INGREDIENTS"),
          h("div",{style:{display:"flex",flexDirection:"column",gap:5}},
            batchMeal.ingredients.map((ing,ii)=>{
              const isDiv=ing.startsWith("—");
              return isDiv
                ?h("div",{key:ii,style:{fontFamily:FONT,fontSize:10,letterSpacing:1.5,color:AMBER,marginTop:6,marginBottom:2}},ing)
                :h("div",{key:ii,style:{display:"flex",gap:7,alignItems:"flex-start"}},
                  h("span",{style:{color:AMBER,fontSize:10,marginTop:3,flexShrink:0}},"·"),
                  h("span",{style:{fontSize:12,color:TEXT,lineHeight:1.5}},ing)
                );
            })
          )
        ),
        h("div",null,
          h("div",{style:{fontFamily:FONT,fontSize:9,letterSpacing:2,color:MUTED,marginBottom:7}},"STEPS"),
          batchMeal.steps.map((step,si)=>h("div",{key:si,style:{display:"flex",gap:8,marginBottom:7}},
            h("span",{style:{fontFamily:FONT,fontSize:11,fontWeight:800,color:AMBER,flexShrink:0}},si+1+"."),
            h("div",{style:{fontSize:12,color:TEXT,lineHeight:1.6}},step)
          ))
        )
      )
    )
  );
}

// ── GROCERY PAGE ─────────────────────────────────────────────────────────────
function GroceryPage(){
  const SKEY="meals_grocery_v1";
  function load(){try{const r=localStorage.getItem(SKEY);return r?new Set(JSON.parse(r)):new Set();}catch(e){return new Set();}}
  const [checked,setChecked]=useState(()=>load());
  const [activeSection,setActiveSection]=useState("produce");

  function toggle(key){
    setChecked(prev=>{
      const next=new Set(prev);next.has(key)?next.delete(key):next.add(key);
      try{localStorage.setItem(SKEY,JSON.stringify([...next]));}catch(e){}
      return next;
    });
  }
  function clearSection(sec){
    setChecked(prev=>{
      const next=new Set(prev);
      GROCERY[sec].items.forEach((_,i)=>next.delete(sec+i));
      try{localStorage.setItem(SKEY,JSON.stringify([...next]));}catch(e){}
      return next;
    });
  }
  function clearAll(){setChecked(new Set());try{localStorage.removeItem(SKEY);}catch(e){}}

  const sections=Object.keys(GROCERY);
  const totalItems=sections.reduce((a,s)=>a+GROCERY[s].items.length,0);
  const totalChecked=[...checked].length;
  const pct=Math.round((totalChecked/totalItems)*100);
  const sec=GROCERY[activeSection];
  const estTotal=sections.reduce((sum,s)=>sum+GROCERY[s].items.reduce((a,item)=>{
    const m=item.est.match(/[\d.]+/);return a+(m?parseFloat(m[0]):0);
  },0),0);
  const SLABELS={produce:"PRODUCE",dairy:"DAIRY",meat:"MEAT",pantry:"PANTRY"};

  return h("div",{style:{paddingTop:14}},
    // Summary card
    h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderLeft:`3px solid #22C55E`,borderRadius:10,padding:"12px 14px",marginBottom:12}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
        h("div",null,
          h("div",{style:{fontFamily:FONT,fontSize:10,letterSpacing:2.5,color:MUTED}},"JUMBO · HOLENDRECHT"),
          h("div",{style:{fontFamily:FONT,fontSize:20,fontWeight:800,color:TEXT,marginTop:3}},"\u20ac"+Math.floor(estTotal)+"\u2013"+(Math.floor(estTotal)+5),h("span",{style:{fontFamily:FBODY,fontSize:12,color:MUTED,fontWeight:400}}," week 1")),
          h("div",{style:{fontSize:11,color:MUTED,marginTop:2}},"~\u20ac72/week from week 2 onwards")
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontFamily:FONT,fontSize:26,fontWeight:800,color:pct===100?"#22C55E":GREEN}},totalChecked+"/"+totalItems),
          h("div",{style:{fontSize:10,color:MUTED,marginTop:1}},"items ticked")
        )
      ),
      h("div",{style:{background:"#0D1117",borderRadius:4,height:7,overflow:"hidden",marginBottom:6}},
        h("div",{style:{width:Math.max(0,pct)+"%",height:"100%",background:pct===100?"#22C55E":GREEN,borderRadius:4,transition:"width 0.3s"}})
      ),
      pct===100
        ?h("div",{style:{fontSize:11,color:"#22C55E",fontFamily:FONT,letterSpacing:1,textAlign:"center"}},"ALL DONE \u2014 READY TO PREP!")
        :pct>0&&h("button",{onClick:clearAll,style:{background:"transparent",border:"none",color:MUTED,fontSize:11,cursor:"pointer",padding:0,fontFamily:FONT,letterSpacing:1}},"CLEAR ALL")
    ),
    // Section tabs
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}},
      sections.map(s=>{
        const info=GROCERY[s];
        const secDone=info.items.filter((_,i)=>checked.has(s+i)).length;
        const allDone=secDone===info.items.length;const active=activeSection===s;
        return h("button",{key:s,onClick:()=>setActiveSection(s),style:{background:active?`${info.color}18`:CARD,border:`2px solid ${active?info.color:BORDER}`,borderRadius:8,padding:"9px 4px",cursor:"pointer",textAlign:"center",transition:"all 0.15s"}},
          h("div",{style:{fontFamily:FONT,fontSize:9,letterSpacing:1.5,color:active?info.color:MUTED,marginBottom:3}},SLABELS[s]),
          h("div",{style:{fontFamily:FONT,fontSize:14,fontWeight:800,color:allDone?"#22C55E":active?info.color:MUTED}},secDone+"/"+info.items.length)
        );
      })
    ),
    // Item list
    h("div",{style:{background:CARD,border:`1px solid ${BORDER}`,borderLeft:`3px solid ${sec.color}`,borderRadius:10,overflow:"hidden",marginBottom:8}},
      h("div",{style:{padding:"11px 14px 9px",borderBottom:`1px solid ${BORDER}`,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",null,
          h("div",{style:{fontFamily:FONT,fontSize:13,fontWeight:800,letterSpacing:1,color:TEXT}},sec.label.toUpperCase()),
          h("div",{style:{fontSize:11,color:MUTED,marginTop:2}},sec.items.filter((_,i)=>checked.has(activeSection+i)).length+" of "+sec.items.length+" ticked")
        ),
        h("button",{onClick:()=>clearSection(activeSection),style:{background:"transparent",border:`1px solid ${BORDER}`,color:MUTED,borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:FONT,fontSize:10,letterSpacing:1}},"CLEAR")
      ),
      sec.items.map((item,i)=>{
        const key=activeSection+i;const done=checked.has(key);
        return h("div",{key:i,onClick:()=>toggle(key),style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px",borderBottom:i<sec.items.length-1?`1px solid ${BORDER}`:"none",cursor:"pointer",background:done?"rgba(34,197,94,0.05)":i%2===0?"transparent":"rgba(255,255,255,0.012)",transition:"background 0.15s"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}},
            h("div",{style:{width:22,height:22,borderRadius:5,border:`2px solid ${done?"#22C55E":BORDER}`,background:done?"#22C55E":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}},
              done&&h("span",{style:{color:"#fff",fontSize:11,fontWeight:800,lineHeight:1}},"\u2713")
            ),
            h("div",{style:{minWidth:0}},
              h("div",{style:{fontSize:13,color:done?MUTED:TEXT,textDecoration:done?"line-through":"none",lineHeight:1.3}},item.name),
              h("div",{style:{fontSize:11,color:MUTED,marginTop:2}},item.qty)
            )
          ),
          h("div",{style:{fontFamily:FONT,fontSize:12,color:done?MUTED:sec.color,fontWeight:700,flexShrink:0,marginLeft:10}},item.est)
        );
      })
    )
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("plan");

  const NAV=[
    {id:"plan",label:"MEAL PLAN",icon:"\uD83C\uDF71"},
    {id:"grocery",label:"GROCERY",icon:"\uD83D\uDED2"},
  ];

  return h("div",{style:{background:BG,minHeight:"100vh",paddingBottom:"calc(64px + env(safe-area-inset-bottom))"}},
    // Header
    h("div",{style:{background:CARD,borderBottom:`1px solid ${BORDER}`,padding:"12px 16px 10px",position:"sticky",top:0,zIndex:50}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",null,
          h("div",{style:{fontFamily:FONT,fontSize:20,fontWeight:800,letterSpacing:3,color:GREEN,lineHeight:1}},"MEALS"),
          h("div",{style:{fontSize:10,color:MUTED,letterSpacing:1.5,marginTop:2}},"WEEKLY PLAN · 2,800 KCAL")
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:11,color:MUTED}},"Week "+((getWeekNum()%26)+1)+" / 26"),
          h("div",{style:{fontSize:10,color:MUTED,marginTop:1}},"Apr 26 – Oct 26, 2025")
        )
      )
    ),
    // Page content
    h("div",{style:{maxWidth:640,margin:"0 auto",padding:"0 12px"}},
      tab==="plan"&&h(PlanPage,null),
      tab==="grocery"&&h(GroceryPage,null)
    ),
    // Tab bar
    h("div",{className:"tab-bar"},
      NAV.map(({id,label,icon})=>h("button",{key:id,className:`tab-btn${tab===id?" active":""}`,onClick:()=>setTab(id)},
        h("span",{className:"tab-icon"},icon),
        h("span",{className:"tab-label"},label)
      ))
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
